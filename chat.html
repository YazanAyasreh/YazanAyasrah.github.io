<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Live Chat | Yazan Ayasrah</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <style>
.chat-container {
    background: linear-gradient(135deg, #1a1a1a 0%, #242442 100%);
    border-radius: 15px;
    border: 1px solid #333;
    padding: 25px;
    max-width: 800px;
    margin: 0 auto;
}

.auth-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.auth-tab {
    background: rgba(0, 0, 0, 0.3);
    padding: 12px 25px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 600;
    color: #aaa;
    transition: all 0.3s ease;
    border: 1px solid #333;
}

.auth-tab.active {
    background: linear-gradient(135deg, #00ffcc, #00ccaa);
    color: #000;
    border-color: #00ffcc;
}

.auth-form {
    display: none;
    flex-direction: column;
    gap: 15px;
}

.auth-form.active {
    display: flex;
}

.auth-form h3 {
    color: #00ffcc;
    margin-bottom: 10px;
}

.auth-form input {
    padding: 12px 15px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid #333;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
}

.auth-form input:focus {
    outline: none;
    border-color: #00ffcc;
    box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
}

.auth-form button {
    padding: 12px 25px;
    background: linear-gradient(135deg, #00ffcc, #00ccaa);
    color: #000;
    border: none;
    border-radius: 25px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
}

.auth-form button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(0, 255, 204, 0.3);
}

.error-message {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 5px;
}

.chat-interface {
    display: flex;
    flex-direction: column;
    height: 500px;
}

.chat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 15px;
    border-bottom: 1px solid #333;
    margin-bottom: 15px;
}

.chat-header h3 {
    color: #00ffcc;
}

.user-info {
    display: flex;
    align-items: center;
    gap: 15px;
}

#current-user {
    color: #aaa;
}

#logout-btn {
    padding: 8px 15px;
    background: rgba(255, 107, 107, 0.2);
    color: #ff6b6b;
    border: 1px solid #ff6b6b;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
}

#logout-btn:hover {
    background: rgba(255, 107, 107, 0.4);
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.message {
    max-width: 70%;
    padding: 12px 15px;
    border-radius: 15px;
    animation: messageSlide 0.3s ease;
}

@keyframes messageSlide {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.message.own {
    align-self: flex-end;
    background: linear-gradient(135deg, #00ffcc, #00ccaa);
    color: #000;
}

.message.other {
    align-self: flex-start;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid #333;
}

.message-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    font-size: 12px;
}

.message.own .message-header {
    color: rgba(0, 0, 0, 0.6);
}

.message.other .message-header {
    color: #777;
}

.username {
    font-weight: 700;
}

.time {
    opacity: 0.7;
}

.message-text {
    font-size: 14px;
    line-height: 1.4;
}

.chat-input {
    display: flex;
    gap: 10px;
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid #333;
}

.chat-input input {
    flex: 1;
    padding: 12px 15px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid #333;
    border-radius: 25px;
    color: #fff;
    font-size: 14px;
}

.chat-input input:focus {
    outline: none;
    border-color: #00ffcc;
}

.chat-input button {
    padding: 12px 25px;
    background: linear-gradient(135deg, #00ffcc, #00ccaa);
    color: #000;
    border: none;
    border-radius: 25px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
}

.chat-input button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(0, 255, 204, 0.3);
}

/* Scrollbar styling */
.chat-messages::-webkit-scrollbar {
    width: 8px;
}

.chat-messages::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
}

.chat-messages::-webkit-scrollbar-thumb {
    background: #00ffcc;
    border-radius: 10px;
}

.chat-messages::-webkit-scrollbar-thumb:hover {
    background: #00ddbb;
}

    </style>
    <header>
        <h1>YAZAN.dev</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
            <a href="chat.html" class="active">Live Chat</a>
        </nav>
    </header>

    <section class="section">
        <h2>Developer Live Chat</h2>
        <div class="chat-container">
            <!-- Authentication Forms -->
            <div class="auth-forms" id="auth-forms">
                <div class="auth-tab active" data-tab="login">Login</div>
                <div class="auth-tab" data-tab="register">Register</div>
                
                <form id="login-form" class="auth-form active">
                    <h3>Login to Chat</h3>
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                    <p id="login-error" class="error-message"></p>
                </form>
                
                <form id="register-form" class="auth-form">
                    <h3>Register for Chat</h3>
                    <input type="text" id="reg-username" placeholder="Username" required>
                    <input type="email" id="reg-email" placeholder="Email" required>
                    <input type="password" id="reg-password" placeholder="Password" required>
                    <button type="submit">Register</button>
                    <p id="register-error" class="error-message"></p>
                </form>
            </div>
            
            <!-- Chat Interface (hidden until logged in) -->
            <div class="chat-interface" id="chat-interface" style="display: none;">
                <div class="chat-header">
                    <h3>Developer Community Chat</h3>
                    <div class="user-info">
                        <span id="current-user">Welcome!</span>
                        <button id="logout-btn">Logout</button>
                    </div>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will be loaded here -->
                </div>
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Type a message...">
                    <button id="send-btn">Send</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        © 2026 Yazan Ayasrah | All Rights Reserved
    </footer>
