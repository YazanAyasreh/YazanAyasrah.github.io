<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Live Chat | Yazan Ayasrah</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>YAZAN.dev</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
            <a href="chat.html" class="active">Live Chat</a>
        </nav>
    </header>

    <section class="section">
        <h2>Developer Live Chat</h2>
        <div class="chat-container">
            <!-- Authentication Forms -->
            <div class="auth-forms" id="auth-forms">
                <div class="auth-tab active" data-tab="login">Login</div>
                <div class="auth-tab" data-tab="register">Register</div>
                
                <form id="login-form" class="auth-form active">
                    <h3>Login to Chat</h3>
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                    <p id="login-error" class="error-message"></p>
                </form>
                
                <form id="register-form" class="auth-form">
                    <h3>Register for Chat</h3>
                    <input type="text" id="reg-username" placeholder="Username" required>
                    <input type="email" id="reg-email" placeholder="Email" required>
                    <input type="password" id="reg-password" placeholder="Password" required>
                    <button type="submit">Register</button>
                    <p id="register-error" class="error-message"></p>
                </form>
            </div>
            
            <!-- Chat Interface (hidden until logged in) -->
            <div class="chat-interface" id="chat-interface" style="display: none;">
                <div class="chat-header">
                    <h3>Developer Community Chat</h3>
                    <div class="user-info">
                        <span id="current-user">Welcome!</span>
                        <button id="logout-btn">Logout</button>
                    </div>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will be loaded here -->
                </div>
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Type a message...">
                    <button id="send-btn">Send</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        © 2026 Yazan Ayasrah | All Rights Reserved
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Firebase Configuration - Replace with your Firebase project config -->
    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
    </script>
    
    <script src="chat.js"></script>
</body>
</html>
